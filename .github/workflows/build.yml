name: Build & publish Mattermost image

on:
  push: 
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

jobs:
  build-and-publish:
    name: Build patched server and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo and OIDC submodule
        uses: actions/checkout@v7.0.0
        with: 
          submodules: recursive

      - name: Read Mattermost version from Dockerfile
        id: ver
        run: echo "mm=$(grep -oP 'ARG MM_VERSION=\K.*' Dockerfile)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (and push on main only)
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          tags: |
            ghcr.io/bsstudio/mattermost-team-edition:${{ steps.ver.outputs.mm }}
            ghcr.io/bsstudio/mattermost-team-edition:latest
