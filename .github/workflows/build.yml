name: Build & publish Mattermost image

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read
  packages: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

jobs:
  build-and-publish:
    name: Build patched server and push to GHCR
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo and OIDC submodule
        uses: actions/checkout@v7.0.0
        with:
          submodules: recursive

      - name: Read Mattermost version from Dockerfile
        id: ver
        run: echo "mm=$(grep -oP 'ARG MM_VERSION=\K.*' Dockerfile)" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v4.2.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Derive tags and OCI labels
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ghcr.io/bsstudio/mattermost-team-edition
          tags: |
            type=raw,value=${{ steps.ver.outputs.mm }}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build image (and push on main only)
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          platforms: linux/amd64
          push: ${{ github.event_name == 'push' }}
          provenance: false
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          annotations: ${{ steps.meta.outputs.annotations }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
